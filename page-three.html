<!DOCTYPE html>
<html lang="nl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Aangifte erfbelasting 2026</title>
	<link rel="stylesheet" href="styles/style.css">
</head>
<body>
	<header>Dit is een school opdracht</header>
	<main>
		<section>
			<h1>Aangifte erfbelasting 2026</h1>
			<img class="hero" src="img/trein.jpg" alt="trein">
		</section>
		<form>
			<fieldset>
				<legend>Gegevens gemachtigde</legend>
				<p>Vul 1 van de 3 in: het bsn of RSIN van de gemachtigde, het beconnummer van de adviseur of het protocolnummer van de notaris.</p>
				<div class="three-col">
					<label>Bsn/RSIN gemachtigde
						<input required type="number" name="bsn">
					</label>
					<label>Beconnummer adviseur
						<input required type="number">
					</label>
					<label>Beconnummer adviseur
							<input required type="number" name="Beconnummer">
					</label>
				</div>
				<input type="submit" value="Volgende">
			</fieldset>
		</form>
	</main>
	<footer>
		<b>Over</b>
		<ul>
			<li>Minor</li>
			<li>Webdesign</li>
			<li>Development</li>
			<li>Alisha</li>
		</ul>
	</footer>
	<script src="script.js"></script>
</body>
</html>
